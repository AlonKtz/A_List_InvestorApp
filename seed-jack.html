<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seed Jack — The A List</title>
  <style>
    body { font-family: monospace; background: #0f172a; color: #94a3b8; padding: 40px; max-width: 640px; }
    h1   { color: #34d399; margin-bottom: 4px; }
    p    { color: #64748b; font-size: 13px; margin: 0 0 24px; }
    .ok  { color: #34d399; }
    .err { color: #f87171; }
    .inf { color: #60a5fa; }
    pre  { margin: 3px 0; font-size: 13px; }
    #run { padding: 10px 24px; background: #059669; border: none; border-radius: 8px;
           color: #fff; font-family: monospace; font-size: 14px; font-weight: 700;
           cursor: pointer; margin-bottom: 24px; }
    #run:hover { background: #047857; }
    #run:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Seed Jack's Demo Account</h1>
  <p>Run this once to create Jack's account and populate his 17 trades. Safe to run again — it skips account creation if Jack already exists.</p>
  <button id="run">▶ Run Seeder</button>
  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite/dist/iife/sdk.js"></script>
  <script src="config.js"></script>
  <script>
    const { Client, Account, Databases, ID, Permission, Role } = Appwrite;
    const client    = new Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
    const account   = new Account(client);
    const databases = new Databases(client);

    const JACK_EMAIL    = 'jack@alist.demo';
    const JACK_PASSWORD = 'DemoJack123!';

    // 17 trades seeded in chronological order (important — chrono sort is by $createdAt)
    // Tags auto-computed by app.js based on sequence:
    //  idx 0-2: CLEAN (first 3 tech wins)
    //  idx 3:   TUNNEL_VISION (4th tech trade in a row)
    //  idx 4:   PANIC_EXIT (day trade loss, prev was win)
    //  idx 5-6: REVENGE_TRADE (after loss)
    //  idx 7-9: CLEAN (back-to-back wins)
    //  idx 10:  EUPHORIA_TRADE (same-day loss after a win)
    //  idx 11-12: REVENGE_TRADE (after losses)
    //  idx 13:  EUPHORIA_TRADE (same-day loss after a win)
    //  idx 14:  REVENGE_TRADE (after loss)
    //  idx 15-16: CLEAN (recovery)
    const TRADES = [
      { stock:'AAPL',  sector:'Technology',    entry_price:185,   exit_price:192,   qty:40,  cat:'Day Trade',     date:'2025-09-10', entryT:'09:30' },
      { stock:'MSFT',  sector:'Technology',    entry_price:415,   exit_price:440,   qty:10,  cat:'Swing Trade',   date:'2025-09-18', entryT:'09:30' },
      { stock:'NVDA',  sector:'Technology',    entry_price:478,   exit_price:495,   qty:15,  cat:'Day Trade',     date:'2025-10-02', entryT:'09:30' },
      { stock:'AMD',   sector:'Technology',    entry_price:154,   exit_price:161,   qty:25,  cat:'Day Trade',     date:'2025-10-15', entryT:'09:30' },
      { stock:'JPM',   sector:'Financials',    entry_price:212,   exit_price:205,   qty:20,  cat:'Day Trade',     date:'2025-10-28', entryT:'09:30' },
      { stock:'BA',    sector:'Industrials',   entry_price:168,   exit_price:159,   qty:15,  cat:'Swing Trade',   date:'2025-11-05', entryT:'09:30' },
      { stock:'XOM',   sector:'Energy',        entry_price:115,   exit_price:128,   qty:30,  cat:'Swing Trade',   date:'2025-11-12', entryT:'09:30' },
      { stock:'LLY',   sector:'Healthcare',    entry_price:795,   exit_price:855,   qty:5,   cat:'Long Position', date:'2025-11-20', entryT:'09:30' },
      { stock:'GOOGL', sector:'Communication', entry_price:168,   exit_price:180,   qty:20,  cat:'Long Position', date:'2025-12-03', entryT:'09:30' },
      { stock:'META',  sector:'Communication', entry_price:580,   exit_price:595,   qty:15,  cat:'Day Trade',     date:'2025-12-10', entryT:'09:30' },
      { stock:'TSLA',  sector:'Consumer Disc', entry_price:250,   exit_price:238,   qty:20,  cat:'Day Trade',     date:'2025-12-10', entryT:'10:15' }, // same day as META → EUPHORIA
      { stock:'TSLA',  sector:'Consumer Disc', entry_price:400,   exit_price:385,   qty:25,  cat:'Day Trade',     date:'2026-01-08', entryT:'09:30' },
      { stock:'COIN',  sector:'Financials',    entry_price:235,   exit_price:252,   qty:30,  cat:'Day Trade',     date:'2026-01-15', entryT:'09:30' },
      { stock:'SOFI',  sector:'Financials',    entry_price:12.50, exit_price:11.80, qty:300, cat:'Day Trade',     date:'2026-01-15', entryT:'10:00' }, // same day as COIN → EUPHORIA
      { stock:'PLTR',  sector:'Technology',    entry_price:72,    exit_price:85,    qty:40,  cat:'Swing Trade',   date:'2026-02-01', entryT:'09:30' },
      { stock:'AMZN',  sector:'Consumer Disc', entry_price:225,   exit_price:248,   qty:15,  cat:'Long Position', date:'2026-02-14', entryT:'09:30' },
      { stock:'SPY',   sector:'ETF',           entry_price:590,   exit_price:612,   qty:10,  cat:'Swing Trade',   date:'2026-03-05', entryT:'09:30' },
    ];

    const holdDays = { 'Day Trade': 0, 'Short Sell': 0, 'Swing Trade': 5, 'Long Position': 30 };

    function log(msg, cls = 'inf') {
      const el = document.createElement('pre');
      el.className = cls;
      el.textContent = msg;
      document.getElementById('log').appendChild(el);
    }

    document.getElementById('run').addEventListener('click', async () => {
      document.getElementById('run').disabled = true;
      document.getElementById('log').innerHTML = '';

      // 1. Create or sign in as Jack
      log('Creating Jack\'s account…');
      let userId;
      try {
        const u = await account.create(ID.unique(), JACK_EMAIL, JACK_PASSWORD, 'Jack (Demo)');
        userId = u.$id;
        log(`✓ Account created: ${userId}`, 'ok');
      } catch (e) {
        if (e.code === 409) {
          log('Account already exists — logging in instead…', 'inf');
        } else {
          log(`✗ Create failed (${e.code}): ${e.message}`, 'err');
          document.getElementById('run').disabled = false;
          return;
        }
      }

      log('Logging in as Jack…');
      try {
        try { await account.deleteSession('current'); } catch(_) {}
        await account.createEmailPasswordSession(JACK_EMAIL, JACK_PASSWORD);
        const me = await account.get();
        userId = me.$id;
        log(`✓ Signed in — user ID: ${userId}`, 'ok');
      } catch (e) {
        log(`✗ Login failed: ${e.message}`, 'err');
        document.getElementById('run').disabled = false;
        return;
      }

      // 2. Seed trades in order (order determines $createdAt, which drives chrono sort)
      log(`\nSeeding ${TRADES.length} trades…`);
      let ok = 0, fail = 0;
      for (const t of TRADES) {
        const entryTime = `${t.date}T${t.entryT}:00`;
        const exitDate  = new Date(t.date);
        exitDate.setDate(exitDate.getDate() + (holdDays[t.cat] ?? 0));
        const exitTime  = `${exitDate.toISOString().slice(0, 10)}T16:00:00`;
        const pnl       = (t.exit_price - t.entry_price) * t.qty;
        const sign      = pnl >= 0 ? '+' : '';

        try {
          await databases.createDocument(
            APPWRITE_DATABASE_ID,
            APPWRITE_COLLECTION_ID,
            ID.unique(),
            {
              stock:          t.stock,
              sector:         t.sector,
              entry_price:    t.entry_price,
              exit_price:     t.exit_price,
              entry_time:     entryTime,
              exit_time:      exitTime,
              order_category: t.cat,
              quantity:       t.qty
            },
            [Permission.read(Role.user(userId)), Permission.write(Role.user(userId))]
          );
          log(`  ✓ ${t.stock.padEnd(6)} ${t.cat.padEnd(14)} ${sign}$${Math.abs(pnl).toFixed(0).padStart(5)}   ${t.date}`, 'ok');
          ok++;
        } catch (e) {
          log(`  ✗ ${t.stock}: ${e.message}`, 'err');
          fail++;
        }
      }

      log('');
      if (fail === 0) {
        log(`✓ All ${ok} trades seeded. Open the app and use "Demo Login — Jack" to see them.`, 'ok');
      } else {
        log(`Done: ${ok} succeeded, ${fail} failed.`, 'err');
      }
      document.getElementById('run').disabled = false;
    });
  </script>
</body>
</html>
