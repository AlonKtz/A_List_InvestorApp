<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seed Bearded Jack — The A List</title>
  <style>
    body { font-family: monospace; background: #0f172a; color: #94a3b8; padding: 40px; max-width: 680px; }
    h1   { color: #34d399; margin-bottom: 4px; }
    p    { color: #64748b; font-size: 13px; margin: 0 0 24px; }
    .ok  { color: #34d399; }
    .err { color: #f87171; }
    .inf { color: #60a5fa; }
    pre  { margin: 3px 0; font-size: 13px; white-space: pre-wrap; }
    #run { padding: 10px 24px; background: #059669; border: none; border-radius: 8px;
           color: #fff; font-family: monospace; font-size: 14px; font-weight: 700;
           cursor: pointer; margin-bottom: 24px; }
    #run:hover { background: #047857; }
    #run:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Seed Bearded Jack's Demo Account</h1>
  <p>Creates the demo user "Bearded Jack, Amateur Investor" and populates a portfolio engineered to exercise every app feature. Re-running wipes his existing trades first, so the result is always exactly these 16 trades.</p>
  <button id="run">▶ Run Seeder</button>
  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite/dist/iife/sdk.js"></script>
  <script src="config.js"></script>
  <script>
    const { Client, Account, Databases, ID, Query, Permission, Role } = Appwrite;
    const client    = new Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
    const account   = new Account(client);
    const databases = new Databases(client);

    const JACK_EMAIL    = 'jack@alist.demo';
    const JACK_PASSWORD = 'DemoJack123!';
    const JACK_NAME     = 'Bearded Jack';

    // ── Portfolio engineered to maximize every dashboard feature ──
    // Seeded in chronological order (chrono sort = $createdAt = insertion order).
    // Tags are auto-derived by app.js from the sequence. The design hits all of:
    //   • All 5 behavioral tags in the pie:
    //       CLEAN ×6, TUNNEL_VISION ×2, PANIC_EXIT ×1, REVENGE_TRADE ×5, EUPHORIA_TRADE ×2
    //   • All 4 order types (Day Trade, Swing Trade, Long Position, Short Sell)
    //   • Short Sell shown both losing (idx7) and winning (idx15)
    //   • Composure ~56 (warn): 4 of 9 day trades lost
    //   • FOMO Tax = $770 across 2 same-day chaser losses (idx11, idx14)
    //   • Tilt Multiplier ~1.38× (danger): escalating losses idx5→6→7
    //   • Best trade  +$1380 (XOM, idx9) · Worst trade  -$700 (C short, idx7)
    //   • Top Sectors: Energy (+1860) & Technology (+1804)
    //   • Cumulative P&L: rises, craters mid-run on the Financials cluster, recovers to +$2899
    // idx: 0   1   2   3(TUN) 4(TUN) 5(PANIC) 6(REV) 7(REV/worst) 8(REV)
    //      9(best/CLEAN) 10 11(EUPH/FOMO) 12(REV) 13 14(EUPH/FOMO) 15(REV/short win)
    const TRADES = [
      { stock:'AAPL', sector:'Technology',       entry_price:180,  exit_price:188,  qty:50,  cat:'Day Trade',     date:'2025-08-04', entryT:'09:30' },
      { stock:'MSFT', sector:'Technology',       entry_price:410,  exit_price:432,  qty:12,  cat:'Swing Trade',   date:'2025-08-12', entryT:'09:30' },
      { stock:'NVDA', sector:'Technology',       entry_price:118,  exit_price:125,  qty:80,  cat:'Day Trade',     date:'2025-08-20', entryT:'09:30' },
      { stock:'AMD',  sector:'Technology',       entry_price:138,  exit_price:145,  qty:40,  cat:'Day Trade',     date:'2025-08-27', entryT:'09:30' }, // TUNNEL
      { stock:'ADBE', sector:'Technology',       entry_price:480,  exit_price:510,  qty:10,  cat:'Swing Trade',   date:'2025-09-03', entryT:'09:30' }, // TUNNEL
      { stock:'JPM',  sector:'Financials',       entry_price:210,  exit_price:203,  qty:30,  cat:'Day Trade',     date:'2025-09-15', entryT:'09:30' }, // PANIC_EXIT (-210)
      { stock:'BAC',  sector:'Financials',       entry_price:38,   exit_price:35.5, qty:200, cat:'Day Trade',     date:'2025-09-22', entryT:'09:30' }, // REVENGE (-500)
      { stock:'C',    sector:'Financials',       entry_price:65,   exit_price:72,   qty:100, cat:'Short Sell',    date:'2025-09-29', entryT:'09:30' }, // REVENGE, short loss (-700) WORST
      { stock:'CVX',  sector:'Energy',           entry_price:150,  exit_price:162,  qty:40,  cat:'Swing Trade',   date:'2025-10-10', entryT:'09:30' }, // REVENGE (+480)
      { stock:'XOM',  sector:'Energy',           entry_price:105,  exit_price:128,  qty:60,  cat:'Long Position', date:'2025-10-20', entryT:'09:30' }, // CLEAN (+1380) BEST
      { stock:'LLY',  sector:'Healthcare',       entry_price:880,  exit_price:905,  qty:15,  cat:'Day Trade',     date:'2025-11-03', entryT:'09:30' }, // CLEAN (+375)
      { stock:'PFE',  sector:'Healthcare',       entry_price:30,   exit_price:28.5, qty:300, cat:'Day Trade',     date:'2025-11-03', entryT:'13:15' }, // EUPHORIA + FOMO (-450, same day as LLY)
      { stock:'KO',   sector:'Consumer Staples', entry_price:60,   exit_price:64,   qty:100, cat:'Swing Trade',   date:'2025-11-14', entryT:'09:30' }, // REVENGE (+400)
      { stock:'NKE',  sector:'Consumer Disc',    entry_price:78,   exit_price:82,   qty:60,  cat:'Day Trade',     date:'2025-11-25', entryT:'09:30' }, // CLEAN (+240)
      { stock:'SBUX', sector:'Consumer Disc',    entry_price:95,   exit_price:91,   qty:80,  cat:'Day Trade',     date:'2025-11-25', entryT:'14:00' }, // EUPHORIA + FOMO (-320, same day as NKE)
      { stock:'GLD',  sector:'ETF',              entry_price:190,  exit_price:182,  qty:50,  cat:'Short Sell',    date:'2025-12-05', entryT:'09:30' }, // REVENGE, short win (+400)
    ];

    const holdDays = { 'Day Trade': 0, 'Short Sell': 0, 'Swing Trade': 5, 'Long Position': 30 };

    function log(msg, cls = 'inf') {
      const el = document.createElement('pre');
      el.className = cls;
      el.textContent = msg;
      document.getElementById('log').appendChild(el);
    }

    document.getElementById('run').addEventListener('click', async () => {
      document.getElementById('run').disabled = true;
      document.getElementById('log').innerHTML = '';

      // 1. Create or sign in as Jack
      log('Creating Bearded Jack\'s account…');
      try {
        await account.create(ID.unique(), JACK_EMAIL, JACK_PASSWORD, JACK_NAME);
        log('✓ Account created', 'ok');
      } catch (e) {
        if (e.code === 409) {
          log('Account already exists — logging in instead…', 'inf');
        } else {
          log(`✗ Create failed (${e.code}): ${e.message}`, 'err');
          document.getElementById('run').disabled = false;
          return;
        }
      }

      log('Logging in as Jack…');
      let userId;
      try {
        try { await account.deleteSession('current'); } catch (_) {}
        await account.createEmailPasswordSession(JACK_EMAIL, JACK_PASSWORD);
        const me = await account.get();
        userId = me.$id;
        log(`✓ Signed in — user ID: ${userId}`, 'ok');
      } catch (e) {
        log(`✗ Login failed: ${e.message}`, 'err');
        document.getElementById('run').disabled = false;
        return;
      }

      // 2. Wipe any existing trades so the portfolio is always exact
      log('\nClearing existing trades…');
      try {
        const existing = await databases.listDocuments(
          APPWRITE_DATABASE_ID, APPWRITE_COLLECTION_ID, [Query.limit(100)]
        );
        for (const doc of existing.documents) {
          await databases.deleteDocument(APPWRITE_DATABASE_ID, APPWRITE_COLLECTION_ID, doc.$id);
        }
        log(`✓ Removed ${existing.documents.length} old trade(s)`, 'ok');
      } catch (e) {
        log(`(skipped cleanup: ${e.message})`, 'inf');
      }

      // 3. Seed the engineered portfolio in order
      log(`\nSeeding ${TRADES.length} trades…`);
      let ok = 0, fail = 0, running = 0;
      for (const t of TRADES) {
        const entryTime = `${t.date}T${t.entryT}:00`;
        const exitDate  = new Date(t.date);
        exitDate.setDate(exitDate.getDate() + (holdDays[t.cat] ?? 0));
        const exitTime  = `${exitDate.toISOString().slice(0, 10)}T16:00:00`;
        const diff      = t.exit_price - t.entry_price;
        const pnl       = (t.cat === 'Short Sell' ? -diff : diff) * t.qty;
        running        += pnl;
        const sign      = pnl >= 0 ? '+' : '-';

        try {
          await databases.createDocument(
            APPWRITE_DATABASE_ID,
            APPWRITE_COLLECTION_ID,
            ID.unique(),
            {
              stock:          t.stock,
              sector:         t.sector,
              entry_price:    t.entry_price,
              exit_price:     t.exit_price,
              entry_time:     entryTime,
              exit_time:      exitTime,
              order_category: t.cat,
              quantity:       t.qty
            },
            [Permission.read(Role.user(userId)), Permission.write(Role.user(userId))]
          );
          log(`  ✓ ${t.stock.padEnd(5)} ${t.cat.padEnd(14)} ${sign}$${Math.abs(pnl).toFixed(0).padStart(5)}   cum ${running >= 0 ? '+' : '-'}$${Math.abs(running).toFixed(0).padStart(5)}   ${t.date}`, 'ok');
          ok++;
        } catch (e) {
          log(`  ✗ ${t.stock}: ${e.message}`, 'err');
          fail++;
        }
      }

      log('');
      if (fail === 0) {
        log(`✓ All ${ok} trades seeded. Net P&L +$${running.toFixed(0)}.`, 'ok');
        log('Open the app and use "Demo login: Bearded Jack, Amateur Investor".', 'ok');
      } else {
        log(`Done: ${ok} succeeded, ${fail} failed.`, 'err');
      }
      document.getElementById('run').disabled = false;
    });
  </script>
</body>
</html>
